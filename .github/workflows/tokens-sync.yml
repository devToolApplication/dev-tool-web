name: Design Tokens Sync

on:
  push:
    paths:
      - 'tokens/tokens.json'
    branches:
      - master

jobs:
  build-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build design tokens
        run: npm run tokens:build

      - name: Check for generated changes
        id: changes
        run: |
          git diff --quiet src/styles/tokens/generated/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit generated tokens
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/styles/tokens/generated/
          git commit -m "chore: regenerate design tokens from tokens/ source"
          git push

  publish-storybook:
    needs: build-tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build and publish Storybook to Chromatic
        run: npm run publish-storybook
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
