<app-base-layout class="page">
  <router-outlet></router-outlet>
</app-base-layout>

<p-toast position="top-right"></p-toast>

<div class="loading-overlay" [class.visible]="isLoading">
  <div class="loading-box" aria-live="polite" aria-label="Loading">
    <p-progressSpinner
      strokeWidth="4"
      fill="transparent"
      animationDuration=".65s"
    ></p-progressSpinner>
  </div>
</div>
