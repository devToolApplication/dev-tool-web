<p-fileupload
  [mode]="mode"
  [chooseLabel]="chooseLabel | translateContent"
  [uploadLabel]="uploadLabel | translateContent"
  [cancelLabel]="cancelLabel | translateContent"
  [accept]="accept"
  [multiple]="multiple"
  [customUpload]="customUpload"
  [disabled]="disabled"
  [maxFileSize]="maxFileSize"
  (onSelect)="fileSelect.emit($event)"
  (uploadHandler)="uploadHandler.emit($event)"
/>
