<div class="app-field" [class.app-field--invalid]="invalid" [class.app-field--disabled]="disabled">
  <div class="relative">
    @if (iconClass) {
      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[var(--app-text-muted)]" aria-hidden="true">
        <i [class]="iconClass"></i>
      </span>
    }
    <input
      [id]="inputId"
      [type]="showPassword ? 'text' : 'password'"
      [ngModel]="value"
      (ngModelChange)="onChange($event)"
      [disabled]="disabled"
      [readOnly]="readonly"
      [required]="required"
      [attr.autofocus]="autofocus ? true : null"
      [attr.placeholder]="(placeholder || ' ') | translateContent"
      [attr.aria-invalid]="invalid || null"
      autocomplete="off"
      class="peer w-full rounded-lg border bg-[var(--app-custom-input-bg)] px-3 py-2.5 pr-10 text-sm text-[var(--app-custom-input-text)] placeholder-transparent outline-none transition-all duration-150 border-[var(--app-input-border)] hover:border-[var(--app-primary)] focus:border-[var(--app-primary)] focus:ring-2 focus:ring-[var(--app-primary)]/25 disabled:cursor-not-allowed disabled:opacity-60"
      [class.pl-9]="iconClass"
      [class]="styleClass || ''"
      (blur)="onBlur()"
      (focus)="onFocus()"
    />
    @if (toggleMask) {
      <button
        type="button"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-[var(--app-text-muted)] hover:text-[var(--app-primary)] transition-colors"
        [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
        (click)="showPassword = !showPassword"
      >
        <i [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
      </button>
    }
    @if (label) {
      <label
        [attr.for]="inputId"
        class="absolute left-3 top-1/2 -translate-y-1/2 text-sm text-[var(--app-text-muted)] transition-all duration-150 pointer-events-none peer-focus:top-0 peer-focus:text-xs peer-focus:text-[var(--app-accent-violet)] peer-focus:bg-[var(--app-custom-input-bg)] peer-focus:px-1 peer-[:not(:placeholder-shown)]:top-0 peer-[:not(:placeholder-shown)]:text-xs peer-[:not(:placeholder-shown)]:bg-[var(--app-custom-input-bg)] peer-[:not(:placeholder-shown)]:px-1"
        [class.left-9]="iconClass"
      >{{ label | translateContent }}</label>
    }
  </div>

  @if (helpText) {
    <small class="mt-1.5 block text-xs text-[var(--app-text-muted)]">{{ helpText | translateContent }}</small>
  }

  @if (invalid && errorMessage) {
    <small class="mt-1 block text-xs text-[var(--app-control-danger-text)]">{{ errorMessage | translateContent }}</small>
  }
</div>
