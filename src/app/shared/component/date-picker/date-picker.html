<div class="app-field" [class.app-field--invalid]="invalid" [class.app-field--disabled]="disabled">
  <div class="relative">
    @if (iconClass) {
      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[var(--app-text-muted)]" aria-hidden="true">
        <i [class]="iconClass"></i>
      </span>
    }
    <input
      [id]="inputId"
      [type]="showTime ? 'datetime-local' : 'date'"
      [ngModel]="dateStringValue"
      (ngModelChange)="onDateInput($event)"
      [disabled]="disabled"
      [readOnly]="readonly"
      [required]="required"
      [attr.aria-invalid]="invalid || null"
      class="peer w-full rounded-lg border bg-[var(--app-custom-input-bg)] px-3 py-2.5 text-sm text-[var(--app-custom-input-text)] placeholder-transparent outline-none transition-all duration-150 border-[var(--app-input-border)] hover:border-[var(--app-primary)] focus:border-[var(--app-primary)] focus:ring-2 focus:ring-[var(--app-primary)]/25 disabled:cursor-not-allowed disabled:opacity-60"
      [class.pl-9]="iconClass"
      [class]="styleClass || ''"
      (blur)="onBlur()"
      (focus)="onFocus()"
    />
    @if (label) {
      <label
        [attr.for]="inputId"
        class="absolute transition-all duration-150 pointer-events-none"
        [ngClass]="value != null
          ? 'left-3 top-0 -translate-y-1/2 text-xs text-[var(--app-accent-violet)] bg-[var(--app-custom-input-bg)] px-1'
          : 'left-3 top-1/2 -translate-y-1/2 text-sm text-[var(--app-text-muted)]'"
        [class.left-9]="iconClass"
      >{{ label | translateContent }}</label>
    }
  </div>

  @if (helpText) {
    <small class="mt-1.5 block text-xs text-[var(--app-text-muted)]">{{ helpText | translateContent }}</small>
  }

  @if (invalid && errorMessage) {
    <small class="mt-1 block text-xs text-[var(--app-control-danger-text)]">{{ errorMessage | translateContent }}</small>
  }
</div>
