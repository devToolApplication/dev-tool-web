<div class="inline-field" [class]="styleClass">
  <p-checkbox
    [inputId]="inputId"
    [invalid]="invalid"
    [binary]="true"
    [ngModel]="value"
    (ngModelChange)="onChange($event)"
    (onBlur)="onBlur()"
    (onFocus)="onFocus()"
    [disabled]="disabled || readonly"
    [required]="required"
    [indeterminate]="indeterminate"
    [ariaLabel]="(ariaLabel || label || undefined) | translateContent"
  />
  @if (!hideLabel && label) {
    <label [attr.for]="inputId">{{ label | translateContent }}</label>
  }
</div>

@if (helpText) {
  <small [id]="inputId + '-help'" class="app-text-soft">{{ helpText | translateContent }}</small>
}

@if (invalid && errorMessage) {
  <p-message severity="error" size="small" variant="simple">{{ errorMessage | translateContent }}</p-message>
}
