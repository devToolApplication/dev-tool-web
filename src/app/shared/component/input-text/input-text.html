<p-floatlabel [variant]="variant">
  @if (iconClass) {
    <p-iconfield [style.width.%]="fluid ? 100 : null">
      <p-inputicon [class]="iconClass"></p-inputicon>
      <input
        pInputText
        [pSize]="size"
        [id]="inputId"
        type="text"
        [ngModel]="value"
        (ngModelChange)="onChange($event)"
        [disabled]="disabled"
        [readonly]="readonly"
        [required]="required"
        [autofocus]="autofocus"
        [attr.placeholder]="(placeholder || null) | translateContent"
        [invalid]="invalid"
        autocomplete="off"
        [style.width.%]="fluid ? 100 : null"
        [class]="styleClass"
        [attr.title]="(tooltip || null) | translateContent"
        (blur)="onBlur()"
        (focus)="onFocus()"
      />
    </p-iconfield>
  } @else {
    <input
      pInputText
      [pSize]="size"
      [id]="inputId"
      type="text"
      [ngModel]="value"
      (ngModelChange)="onChange($event)"
      [disabled]="disabled"
      [readonly]="readonly"
      [required]="required"
      [autofocus]="autofocus"
      [attr.placeholder]="(placeholder || null) | translateContent"
      [invalid]="invalid"
      autocomplete="off"
      [style.width.%]="fluid ? 100 : null"
      [class]="styleClass"
      [attr.title]="(tooltip || null) | translateContent"
      (blur)="onBlur()"
      (focus)="onFocus()"
    />
  }
  <label [attr.for]="inputId">{{ label | translateContent }}</label>
</p-floatlabel>

@if (helpText && !invalid) {
  <small [id]="inputId + '-help'" class="text-surface-700">{{ helpText | translateContent }}</small>
}

@if (invalid && errorMessage) {
  <p-message severity="error" size="small" variant="simple">{{ errorMessage | translateContent }}</p-message>
}
