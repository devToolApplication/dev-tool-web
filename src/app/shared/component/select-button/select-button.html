<div class="app-field" [class.app-field--disabled]="disabled">
  @if (label) {
    <label class="mb-2 block text-sm font-semibold text-[var(--app-text)]">{{ label | translateContent }}</label>
  }

  <div class="inline-flex gap-1 rounded-lg border border-[var(--app-input-border)] bg-[var(--app-custom-input-bg)] p-1">
    @for (opt of options; track opt.value) {
      <button
        type="button"
        [disabled]="disabled"
        class="rounded-md px-3 py-1.5 text-sm font-medium transition-all duration-150 focus:outline-none focus:ring-2 focus:ring-[var(--app-primary)]/25 disabled:cursor-not-allowed disabled:opacity-60"
        [class]="isOptionSelected(opt.value)
          ? 'bg-[var(--app-primary)] text-white shadow-[0_0_14px_rgba(122,119,255,0.2)]'
          : 'text-[var(--app-text-soft)] hover:text-[var(--app-text)] hover:bg-[var(--app-chart-primary-fill)]'"
        (click)="selectOption(opt.value)"
      >{{ opt.label | translateContent }}</button>
    }
  </div>

  @if (helpText) {
    <small class="mt-1.5 block text-xs text-[var(--app-text-muted)]">{{ helpText | translateContent }}</small>
  }

  @if (invalid && errorMessage) {
    <small class="mt-1 block text-xs text-[var(--app-control-danger-text)]">{{ errorMessage | translateContent }}</small>
  }
</div>
