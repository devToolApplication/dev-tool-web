<button
  [type]="type"
  [disabled]="disabled || loading"
  [attr.aria-label]="(ariaLabel || tooltip || label || null) | translateContent"
  [attr.title]="(tooltip || null) | translateContent"
  [routerLink]="routerLink"
  [queryParams]="queryParams"
  class="inline-flex items-center justify-center gap-2 rounded-lg px-4 py-2 text-sm font-medium transition-all duration-150 focus:outline-none focus:ring-2 focus:ring-[var(--app-primary)]/25 disabled:cursor-not-allowed disabled:opacity-60"
  [ngClass]="buttonClasses"
  [class]="styleClass || ''"
  (click)="buttonClick.emit()"
>
  @if (loading) {
    <i class="pi pi-spinner pi-spin"></i>
  } @else if (icon) {
    <i [class]="icon"></i>
  }
  @if (label) {
    <span>{{ label | translateContent }}</span>
  }
</button>
