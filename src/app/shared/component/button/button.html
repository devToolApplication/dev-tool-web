<p-button
  [label]="label | translateContent"
  [icon]="icon"
  [severity]="severity"
  [disabled]="disabled"
  [loading]="loading"
  [type]="type"
  [text]="text"
  [styleClass]="styleClass"
  [routerLink]="routerLink"
  [queryParams]="queryParams"
  [pTooltip]="(tooltip || '') | translateContent"
  tooltipPosition="top"
  [ariaLabel]="(ariaLabel || tooltip || label || undefined) | translateContent"
  [attr.aria-label]="(ariaLabel || tooltip || label || null) | translateContent"
  (onClick)="buttonClick.emit()"
/>
