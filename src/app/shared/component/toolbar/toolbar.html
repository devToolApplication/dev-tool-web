<p-toolbar [styleClass]="styleClass">
  <ng-template pTemplate="start">
    <ng-content select="[toolbar-start], [toolbar-left]"></ng-content>
  </ng-template>

  <ng-template pTemplate="center">
    <ng-content select="[toolbar-center]"></ng-content>
  </ng-template>

  <ng-template pTemplate="end">
    <ng-content select="[toolbar-end], [toolbar-right]"></ng-content>
  </ng-template>
</p-toolbar>
