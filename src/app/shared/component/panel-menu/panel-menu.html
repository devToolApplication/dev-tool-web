<nav [class]="styleClass || ''" class="rounded-lg border border-[var(--app-border)] bg-[var(--app-surface)] overflow-hidden">
  @for (item of model; track item.label) {
    @if (item.visible !== false) {
      <div class="border-b border-[var(--app-border-soft)] last:border-b-0">
        <button
          type="button"
          class="flex w-full items-center justify-between px-4 py-2.5 text-sm font-medium text-[var(--app-text)] hover:bg-[var(--app-chart-primary-fill)] transition-colors"
          (click)="item.items?.length ? toggleItem(item) : onLeafClick(item)"
        >
          <span class="flex items-center gap-2">
            @if (item.icon) { <i [class]="item.icon" class="text-[var(--app-text-muted)]"></i> }
            <span>{{ item.label | translateContent }}</span>
          </span>
          @if (item.items?.length) {
            <i class="pi text-xs text-[var(--app-text-muted)] transition-transform duration-200" [class]="isExpanded(item) ? 'pi-chevron-down' : 'pi-chevron-right'"></i>
          }
        </button>

        @if (item.items?.length && isExpanded(item)) {
          <div class="bg-[var(--app-surface-soft)] py-1">
            @for (child of item.items; track child.label) {
              @if (child.visible !== false) {
                <button
                  type="button"
                  class="flex w-full items-center gap-2 px-6 py-2 text-sm text-[var(--app-text-soft)] hover:bg-[var(--app-chart-primary-fill)] hover:text-[var(--app-primary)] transition-colors"
                  [disabled]="child.disabled || false"
                  (click)="onLeafClick(child)"
                >
                  @if (child.icon) { <i [class]="child.icon" class="text-[var(--app-text-muted)]"></i> }
                  <span>{{ child.label | translateContent }}</span>
                </button>
              }
            }
          </div>
        }
      </div>
    }
  }
</nav>
