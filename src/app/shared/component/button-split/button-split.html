<div class="relative inline-flex">
  <button
    type="button"
    class="inline-flex items-center gap-2 rounded-l-lg bg-[var(--app-primary)] px-4 py-2 text-sm font-medium text-white transition-all duration-150 hover:brightness-110 focus:outline-none focus:ring-2 focus:ring-[var(--app-primary)]/25"
    (click)="buttonClick.emit()"
  >
    @if (icon) { <i [class]="icon"></i> }
    <span>{{ label | translateContent }}</span>
  </button>
  <button
    type="button"
    class="inline-flex items-center rounded-r-lg border-l border-white/20 bg-[var(--app-primary)] px-2 py-2 text-white transition-all duration-150 hover:brightness-110 focus:outline-none focus:ring-2 focus:ring-[var(--app-primary)]/25"
    [attr.aria-label]="expandAriaLabel | translateContent"
    (click)="menuOpen = !menuOpen"
  >
    <i class="pi pi-chevron-down text-xs"></i>
  </button>

  @if (menuOpen) {
    <div class="absolute right-0 top-full z-50 mt-1 min-w-[12rem] rounded-lg border border-[var(--app-border)] bg-[var(--app-overlay-bg)] shadow-lg backdrop-blur-md overflow-hidden">
      @for (item of model; track item.label) {
        <button
          type="button"
          class="flex w-full items-center gap-2 px-3 py-2 text-sm text-[var(--app-text)] hover:bg-[var(--app-chart-primary-fill)] transition-colors"
          [disabled]="item.disabled || false"
          (click)="onItemClick(item)"
        >
          @if (item.icon) { <i [class]="item.icon" class="text-[var(--app-text-muted)]"></i> }
          <span>{{ item.label | translateContent }}</span>
        </button>
      }
    </div>
  }
</div>
