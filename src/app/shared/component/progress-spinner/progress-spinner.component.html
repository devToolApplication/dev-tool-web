<div
  role="progressbar"
  [attr.aria-label]="ariaLabel | translateContent"
  [attr.title]="ariaLabel | translateContent"
  class="inline-flex items-center justify-center"
  [class]="styleClass || ''"
>
  <svg class="animate-spin" [attr.width]="40" [attr.height]="40" viewBox="0 0 50 50">
    <circle
      cx="25" cy="25" r="20"
      fill="none"
      stroke="var(--app-border)"
      [attr.stroke-width]="strokeWidth"
    />
    <circle
      cx="25" cy="25" r="20"
      fill="none"
      stroke="var(--app-primary)"
      [attr.stroke-width]="strokeWidth"
      stroke-dasharray="80 200"
      stroke-linecap="round"
    />
  </svg>
</div>
