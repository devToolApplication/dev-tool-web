@if (state) {
  <section class="realtime-progress app-border app-bg-card">
    <div class="flex flex-wrap items-center justify-between gap-3">
      <div class="min-w-0">
        <div class="text-sm font-semibold app-text">{{ state.taskType }}</div>
        <div class="truncate text-xs app-text-muted">{{ state.taskId }}</div>
      </div>
      <div class="flex items-center gap-2">
        <app-tag [value]="state.status"></app-tag>
        @if (canCancel()) {
          <app-button icon="pi pi-times" severity="danger" [label]="'cancel'" (buttonClick)="cancel.emit()"></app-button>
        }
      </div>
    </div>

    <div class="mt-3 h-2 overflow-hidden rounded app-bg-soft">
      <div class="h-full progress-fill" [style.width.%]="percent()"></div>
    </div>

    @if (showDetails) {
      <div class="mt-2 grid gap-1 text-xs app-text-muted md:grid-cols-3">
        <span>{{ state.step || '-' }}</span>
        <span>{{ state.message || '-' }}</span>
        <span>{{ state.current ?? 0 }} / {{ state.total ?? 0 }}</span>
      </div>
    }
  </section>
}
