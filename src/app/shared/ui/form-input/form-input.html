<p-fluid>
  <form (ngSubmit)="onSubmit()" class="grid grid-cols-12 gap-6 items-start">

    @for (f of engine.fields; track f.path) {
      @if (f.type === 'array') {

        <app-field-array-renderer
          class="w-full h-full"
          [ngClass]="getCol(f.width)"
          [field]="f">
        </app-field-array-renderer>

      } @else if (f.type === 'group') {

        <app-field-group-renderer
          class="w-full h-full"
          [ngClass]="getCol(f.width)"
          [field]="f">
        </app-field-group-renderer>

      } @else if (f.type === 'tree') {

        <app-field-tree-renderer
          class="w-full h-full"
          [ngClass]="getCol(f.width)"
          [field]="f">
        </app-field-tree-renderer>

      } @else {

        <app-field-renderer
          class="w-full h-full"
          [ngClass]="getCol(f.width)"
          [field]="f">
        </app-field-renderer>

      }
    }

    <ng-content></ng-content>

    <div class="col-span-12 flex justify-end">
      <app-button
        type="submit"
        severity="success"
        [disabled]="submitting"
        [label]="'submit'">
      </app-button>
    </div>

  </form>
</p-fluid>
