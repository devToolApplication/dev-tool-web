<div class="metadata-editor">
  <p-fieldset [legend]="(field.label || 'secretMetadata') | translateContent" class="w-full">
    <div class="metadata-header">
      <span>{{ 'key' | translateContent }}</span>
      <span>{{ 'type' | translateContent }}</span>
      <span>{{ 'value' | translateContent }}</span>
      <span></span>
    </div>

    @for (entry of entries; track trackByIndex($index); let i = $index) {
      <div class="metadata-row">
        <app-input-text
          [value]="entry.key"
          [placeholder]="config.keyPlaceholder ?? 'metadataKey'"
          [disabled]="field.disabled()"
          (valueChange)="updateKey(i, $event)"
        ></app-input-text>

        <app-select
          [options]="typeOptions"
          [value]="entry.type"
          [placeholder]="config.typePlaceholder ?? 'metadataType'"
          [disabled]="field.disabled()"
          (valueChange)="updateType(i, $event)"
        ></app-select>

        @if (entry.type === 'SECRET') {
          <app-select
            [options]="secretOptions"
            [value]="entry.value"
            [placeholder]="config.secretPlaceholder ?? 'selectSecret'"
            [showClear]="true"
            [disabled]="field.disabled()"
            (valueChange)="updateValue(i, $event)"
          ></app-select>
        } @else {
          <app-input-text
            [value]="entry.value"
            [placeholder]="config.valuePlaceholder ?? 'metadataValue'"
            [disabled]="field.disabled()"
            (valueChange)="updateValue(i, $event)"
          ></app-input-text>
        }

        <app-button
          type="button"
          icon="pi pi-trash"
          severity="secondary"
          [text]="true"
          [disabled]="field.disabled()"
          (buttonClick)="removeEntry(i)"
        ></app-button>
      </div>
    }

    <div class="metadata-actions">
      <app-button
        type="button"
        icon="pi pi-plus"
        severity="secondary"
        [label]="config.addButtonLabel ?? 'addMetadata'"
        [disabled]="field.disabled()"
        (buttonClick)="addEntry()"
      ></app-button>
    </div>
  </p-fieldset>
</div>
