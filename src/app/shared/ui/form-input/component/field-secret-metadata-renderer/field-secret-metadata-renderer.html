<div class="metadata-editor">
  <p-fieldset [legend]="field.label || 'Secret Metadata'" class="w-full">
    <div class="metadata-header">
      <span>Key</span>
      <span>Type</span>
      <span>Value</span>
      <span></span>
    </div>

    @for (entry of entries; track trackByIndex($index); let i = $index) {
      <div class="metadata-row">
        <app-input-text
          [value]="entry.key"
          [placeholder]="config.keyPlaceholder ?? 'Metadata key'"
          [disabled]="field.disabled()"
          (valueChange)="updateKey(i, $event)"
        ></app-input-text>

        <app-select
          [options]="typeOptions"
          [value]="entry.type"
          [placeholder]="config.typePlaceholder ?? 'Metadata type'"
          [disabled]="field.disabled()"
          (valueChange)="updateType(i, $event)"
        ></app-select>

        @if (entry.type === 'SECRET') {
          <app-select
            [options]="secretOptions"
            [value]="entry.value"
            [placeholder]="config.secretPlaceholder ?? 'Select secret'"
            [showClear]="true"
            [disabled]="field.disabled()"
            (valueChange)="updateValue(i, $event)"
          ></app-select>
        } @else {
          <app-input-text
            [value]="entry.value"
            [placeholder]="config.valuePlaceholder ?? 'Metadata value'"
            [disabled]="field.disabled()"
            (valueChange)="updateValue(i, $event)"
          ></app-input-text>
        }

        <app-button
          type="button"
          icon="pi pi-trash"
          severity="secondary"
          [text]="true"
          [disabled]="field.disabled()"
          (buttonClick)="removeEntry(i)"
        ></app-button>
      </div>
    }

    <div class="metadata-actions">
      <app-button
        type="button"
        icon="pi pi-plus"
        severity="secondary"
        [label]="config.addButtonLabel ?? 'Add Metadata'"
        [disabled]="field.disabled()"
        (buttonClick)="addEntry()"
      ></app-button>
    </div>
  </p-fieldset>
</div>
