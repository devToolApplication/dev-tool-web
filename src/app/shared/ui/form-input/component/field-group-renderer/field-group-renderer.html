@if (field.visible()) {
  <p-fieldset
    [legend]="(field.label || 'general') | translateContent"
    class="w-full field-group-fieldset">

    <div class="grid grid-cols-12 gap-4">
      @for (f of field.children; track $index) {
        @if (isArrayField(f)) {
          <app-field-array-renderer
            class="w-full h-full"
            [ngClass]="getCol(f.width)"
            [field]="f">
          </app-field-array-renderer>
        } @else if (isTreeField(f)) {
          <app-field-tree-renderer
            class="w-full h-full"
            [ngClass]="getCol(f.width)"
            [field]="f">
          </app-field-tree-renderer>
        } @else {
          <app-field-renderer
            class="w-full h-full"
            [ngClass]="getCol(f.width)"
            [field]="f">
          </app-field-renderer>
        }
      }
    </div>

  </p-fieldset>
}
