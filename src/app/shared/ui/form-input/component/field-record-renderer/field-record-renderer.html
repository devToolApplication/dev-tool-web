<p-fieldset [legend]="(field.label || 'record') | translateContent" class="record-fieldset">
  <div class="record-field" [class.disabled]="field.disabled()">
    <div class="record-field__header">
      <span>{{ (recordConfig?.keyLabel || 'key') | translateContent }}</span>
      <span>{{ (recordConfig?.valueLabel || 'value') | translateContent }}</span>
      <span></span>
    </div>

    @for (entry of recordEntries; track $index; let i = $index) {
      <div class="record-field__row">
        <app-input-text
          [label]="recordConfig?.keyLabel || 'key'"
          [value]="entry.key"
          [disabled]="field.disabled()"
          (valueChange)="onRecordKeyChange(i, $any($event))">
        </app-input-text>
        <app-input-text
          [label]="recordConfig?.valueLabel || 'value'"
          [value]="entry.value"
          [disabled]="field.disabled()"
          (valueChange)="onRecordValueChange(i, $any($event))">
        </app-input-text>
        <app-button
          type="button"
          severity="danger"
          [label]="'delete'"
          [disabled]="field.disabled()"
          (buttonClick)="onRecordRemove(i)">
        </app-button>
      </div>
    }

    <app-button
      type="button"
      severity="secondary"
      [label]="(recordConfig?.addButtonLabel || 'addRow') | translateContent"
      [disabled]="field.disabled()"
      (buttonClick)="onRecordAdd()">
    </app-button>
  </div>
</p-fieldset>
