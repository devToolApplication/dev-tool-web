<p-fieldset [legend]="(field.label || 'record') | translateContent" class="record-fieldset">
  <div class="record-field" [class.disabled]="field.disabled()">
    <div class="record-field__header">
      <span>{{ (recordConfig?.keyLabel || 'key') | translateContent }}</span>
      <span>{{ (recordConfig?.valueLabel || 'value') | translateContent }}</span>
      <span></span>
    </div>

    @for (entry of recordEntries; track $index; let i = $index) {
      <div class="record-field__row">
        <input
          pInputText
          type="text"
          [disabled]="field.disabled()"
          [value]="entry.key"
          (input)="onRecordKeyChange(i, $any($event.target).value)"
        />
        <input
          pInputText
          type="text"
          [disabled]="field.disabled()"
          [value]="entry.value"
          (input)="onRecordValueChange(i, $any($event.target).value)"
        />
        <button
          pButton
          type="button"
          icon="pi pi-times"
          severity="secondary"
          text
          [disabled]="field.disabled()"
          (click)="onRecordRemove(i)">
        </button>
      </div>
    }

    <button
      pButton
      type="button"
      icon="pi pi-plus"
      severity="secondary"
      [label]="(recordConfig?.addButtonLabel || 'addRow') | translateContent"
      [disabled]="field.disabled()"
      (click)="onRecordAdd()">
    </button>
  </div>
</p-fieldset>
