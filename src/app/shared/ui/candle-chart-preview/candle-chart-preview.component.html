<app-panel [title]="title" [description]="description" [surface]="surface">
  <div class="candle-chart-preview">
    @if (loading) {
      <div class="candle-chart-preview__state">
        <app-progress-spinner strokeWidth="3"></app-progress-spinner>
        <span>{{ 'loading' | translateContent }}</span>
      </div>
    } @else if (hasData) {
      <app-trade-bot-chart-preview [response]="response" [config]="config"></app-trade-bot-chart-preview>
    } @else {
      <div class="candle-chart-preview__state candle-chart-preview__state--empty">
        <i class="pi pi-chart-line" aria-hidden="true"></i>
        <span>{{ emptyLabel | translateContent }}</span>
      </div>
    }
  </div>
</app-panel>
