@if (loading) {
  <app-loading-skeleton type="detail" [rows]="6"></app-loading-skeleton>
} @else if (error) {
  <app-error-state [message]="error"></app-error-state>
} @else if (overview) {
  <app-responsive-grid [columns]="2">
    @for (chart of overview.charts; track chart.key) {
      <app-section-panel
        [title]="chart.title"
        density="compact"
      >
        <app-dashboard-chart [series]="chart"></app-dashboard-chart>
      </app-section-panel>
    }

    <app-section-panel
      title="dashboard.resources"
      density="compact"
      [empty]="overview.resources.length === 0"
      emptyTitle="dashboard.emptyResources"
    >
      <app-status-list [items]="resourceItems" density="comfortable"></app-status-list>
    </app-section-panel>
  </app-responsive-grid>
} @else {
  <app-empty-state title="dashboard.noData"></app-empty-state>
}
