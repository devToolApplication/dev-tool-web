<section class="crud-page flex flex-col gap-4">
  <div class="flex flex-col gap-3 rounded-2xl border border-surface-200 bg-surface-0 p-5 shadow-sm lg:flex-row lg:items-start lg:justify-between">
    <div>
      <h2 class="m-0 text-2xl font-semibold">Test Rule</h2>
      <p class="mt-2 text-sm text-surface-500">Preview the selected rule against chart data to verify overlays and signal logic.</p>
    </div>

    <div class="flex flex-wrap items-center gap-2">
      <button pButton type="button" class="p-button-text" icon="pi pi-arrow-left" label="Back" (click)="goBack()"></button>
      <button pButton type="button" icon="pi pi-play" label="Run Preview" [loading]="previewing" (click)="runPreview()"></button>
    </div>
  </div>

  <div class="grid grid-cols-12 gap-4">
    <div class="col-span-12 xl:col-span-4">
      <p-panel>
        <ng-template pTemplate="header">
          <div>
            <div class="text-base font-semibold">Preview Setup</div>
            <div class="text-sm text-surface-500">{{ rule?.code }} - {{ rule?.name }}</div>
          </div>
        </ng-template>

        <div class="grid grid-cols-12 gap-4" [formGroup]="form">
          <div class="col-span-12">
            <label class="mb-2 block text-sm font-medium">Exchange</label>
            <p-select class="w-full" [options]="exchangeOptions" optionLabel="label" optionValue="value" formControlName="exchangeId"></p-select>
          </div>
          <div class="col-span-12">
            <label class="mb-2 block text-sm font-medium">Symbol</label>
            <p-select class="w-full" [options]="symbolOptions" optionLabel="label" optionValue="value" formControlName="symbolId"></p-select>
          </div>
          <div class="col-span-12">
            <label class="mb-2 block text-sm font-medium">From Date</label>
            <p-datepicker appendTo="body" inputStyleClass="w-full" styleClass="w-full" [showIcon]="true" formControlName="fromDate"></p-datepicker>
          </div>
          <div class="col-span-12">
            <label class="mb-2 block text-sm font-medium">To Date</label>
            <p-datepicker appendTo="body" inputStyleClass="w-full" styleClass="w-full" [showIcon]="true" formControlName="toDate"></p-datepicker>
          </div>
          <div class="col-span-12">
            <label class="mb-2 block text-sm font-medium">Rule JSON</label>
            <pre class="m-0 max-h-72 overflow-auto rounded-xl bg-surface-900/95 p-3 text-xs text-surface-0">{{ rule?.configJson | json }}</pre>
          </div>
        </div>
      </p-panel>
    </div>

    <div class="col-span-12 xl:col-span-8">
      <div class="rounded-2xl border border-surface-200 bg-surface-0 p-4 shadow-sm">
        <app-candle-chart [data]="chartPayload" [config]="chartConfig"></app-candle-chart>
      </div>
    </div>
  </div>
</section>
