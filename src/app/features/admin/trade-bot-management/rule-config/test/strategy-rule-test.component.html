<section class="crud-page flex flex-col gap-4">
  <div class="flex flex-col gap-3 rounded-2xl border border-surface-200 bg-surface-0 p-5 shadow-sm lg:flex-row lg:items-start lg:justify-between">
    <div>
      <h2 class="m-0 text-2xl font-semibold">{{ 'tradeBot.strategyRule.test.title' | translateContent }}</h2>
      <p class="mt-2 text-sm text-surface-500">{{ 'tradeBot.strategyRule.test.description' | translateContent }}</p>
    </div>

    <div class="flex flex-wrap items-center gap-2">
      <app-button [text]="true" icon="pi pi-arrow-left" label="tradeBot.back" (buttonClick)="goBack()"></app-button>
      <app-button icon="pi pi-play" label="tradeBot.strategyRule.test.runPreview" [loading]="previewing" (buttonClick)="runPreview()"></app-button>
    </div>
  </div>

  <div class="grid grid-cols-12 gap-4">
    <div class="col-span-12 xl:col-span-4">
      <p-panel>
        <ng-template pTemplate="header">
          <div>
            <div class="text-base font-semibold">{{ 'tradeBot.strategyRule.test.previewSetup' | translateContent }}</div>
            <div class="text-sm text-surface-500">{{ rule?.code }} - {{ rule?.name }}</div>
          </div>
        </ng-template>

        <div class="grid grid-cols-12 gap-4" [formGroup]="form">
          <div class="col-span-12">
            <app-select label="tradeBot.strategy.field.exchange" [options]="exchangeOptions" formControlName="exchangeId"></app-select>
          </div>
          <div class="col-span-12">
            <app-select label="tradeBot.strategy.field.symbol" [options]="symbolOptions" formControlName="symbolId"></app-select>
          </div>
          <div class="col-span-12">
            <app-date-picker label="fromDate" [showIcon]="true" formControlName="fromDate"></app-date-picker>
          </div>
          <div class="col-span-12">
            <app-date-picker label="toDate" [showIcon]="true" formControlName="toDate"></app-date-picker>
          </div>
          <div class="col-span-12">
            <label class="mb-2 block text-sm font-medium">{{ 'tradeBot.strategyRule.test.ruleJson' | translateContent }}</label>
            <pre class="m-0 max-h-72 overflow-auto rounded-xl bg-surface-900/95 p-3 text-xs text-surface-0">{{ rule?.configJson | json }}</pre>
          </div>
        </div>
      </p-panel>
    </div>

    <div class="col-span-12 xl:col-span-8">
      <div class="rounded-2xl border border-surface-200 bg-surface-0 p-4 shadow-sm">
        <app-candle-chart [data]="chartPayload" [config]="chartConfig"></app-candle-chart>
      </div>
    </div>
  </div>
</section>
