<app-panel [title]="TEXT.AutoPause" [description]="TEXT.AutoPauseDesc">
  <app-toggle-switch panel-actions [value]="enabled" (valueChange)="onEnabledChange($event)"></app-toggle-switch>
  <div class="grid grid-cols-2 gap-3">
    @for (item of autoPauseOptions | translateContent; track item.value) {
      <div class="flex items-center gap-2 rounded-xl border app-border p-3">
        <app-check-box
          [label]="item.label"
          [disabled]="!enabled"
          [value]="selectedTypes.includes(item.value)"
          (valueChange)="toggleType.emit(item.value)"
        ></app-check-box>
      </div>
    }
  </div>
</app-panel>
