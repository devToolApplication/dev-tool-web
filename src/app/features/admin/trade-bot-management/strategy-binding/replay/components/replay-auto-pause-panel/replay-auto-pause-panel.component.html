<p-panel>
  <ng-template pTemplate="header">
    <div class="flex w-full items-center justify-between gap-3">
      <div>
        <div class="text-base font-semibold">{{ TEXT.AutoPause | translateContent }}</div>
        <div class="text-sm text-surface-500">{{ TEXT.AutoPauseDesc | translateContent }}</div>
      </div>
      <app-toggle-switch [value]="enabled" (valueChange)="onEnabledChange($event)"></app-toggle-switch>
    </div>
  </ng-template>

  <div class="grid grid-cols-2 gap-3">
    @for (item of autoPauseOptions | translateContent; track item.value) {
      <div class="flex items-center gap-2 rounded-xl border border-surface-200 p-3">
        <app-check-box
          [label]="item.label"
          [disabled]="!enabled"
          [value]="selectedTypes.includes(item.value)"
          (valueChange)="toggleType.emit(item.value)"
        ></app-check-box>
      </div>
    }
  </div>
</p-panel>
