<app-panel [title]="TEXT.EventLog" [description]="TEXT.EventLogDesc">
  <app-tag panel-actions [value]="events.length + ' ' + ('tradeBot.replay.eventLog.count' | translateContent)" severity="contrast"></app-tag>
  <div class="flex flex-col gap-4">
    <app-select-multi
      [options]="eventTypeOptions"
      [value]="selectedFilters"
      placeholder="tradeBot.filter.eventType"
      (valueChange)="onFilterChange($event)"
    ></app-select-multi>

    <div class="flex max-h-[24rem] flex-col gap-2 overflow-auto pr-1">
      @for (event of events; track event.id) {
        <article
          role="button"
          tabindex="0"
          class="rounded-xl border p-3 text-left transition"
          [ngClass]="{
            'app-border-primary app-bg-primary-soft': event.id === selectedEventId,
            'app-border app-bg-card app-hover-border-primary': event.id !== selectedEventId
          }"
          (click)="eventSelect.emit(event)"
          (keydown.enter)="eventSelect.emit(event)"
          (keydown.space)="$event.preventDefault(); eventSelect.emit(event)"
        >
          <div class="flex items-center justify-between gap-2">
            <div class="font-medium">{{ event.title }}</div>
            <app-tag [value]="event.type" severity="secondary"></app-tag>
          </div>
          <div class="mt-1 text-sm app-text-muted">{{ event.candleTime | date:'MM-dd HH:mm' }}</div>
          <div class="mt-1 text-sm app-text-soft">{{ (event.message || TEXT.NoEventDetail) | translateContent }}</div>
        </article>
      }
    </div>
  </div>
</app-panel>
