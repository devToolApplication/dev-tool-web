<app-base-popup
  [visible]="visible"
  [loading]="loading"
  [header]="TEXT.ChooseStrategyType"
  [subheader]="TEXT.StrategyRouteDesc"
  [hasProjectedHeader]="true"
  size="lg"
  (cancel)="cancel.emit()"
  (visibleChange)="visibleChange.emit($event)"
>
  <div popup-header class="flex flex-col gap-1">
    <span class="text-lg font-semibold">{{ TEXT.ChooseStrategyType | translateContent }}</span>
    <small class="app-text-muted">{{ TEXT.ChooseStrategyTypeDesc | translateContent }}</small>
  </div>

  <div class="flex flex-col gap-4">
    <app-input-text
      iconClass="pi pi-search"
      [value]="keyword"
      (valueChange)="keywordChange.emit($event || '')"
      [placeholder]="TEXT.SearchStrategyPlaceholder"
    ></app-input-text>

    <div class="grid grid-cols-12 gap-3">
      @for (item of items; track item.routePath) {
        <article
          role="button"
          tabindex="0"
          class="strategy-type-card col-span-12 rounded-xl border app-border app-bg-card p-4 text-left transition"
          (click)="select.emit(item)"
          (keydown.enter)="select.emit(item)"
          (keydown.space)="$event.preventDefault(); select.emit(item)"
        >
          <div class="flex items-start gap-3">
            <div class="strategy-type-icon flex h-10 w-10 items-center justify-center rounded-full" [style.--strategy-accent]="item.accentColor">
              <i [class]="item.icon"></i>
            </div>
            <div class="min-w-0 flex-1">
              <div class="flex flex-wrap items-center gap-2">
                <span class="font-semibold">{{ item.name }}</span>
                <app-tag [value]="STRATEGY_FAMILY_LABELS[item.family] || item.family" severity="secondary"></app-tag>
              </div>
              <div class="text-sm app-text-muted">{{ item.serviceName }}</div>
              <div class="mt-1 text-sm app-text-soft">{{ (item.shortDescription || item.description) | translateContent }}</div>
            </div>
          </div>
        </article>
      }
    </div>
  </div>
</app-base-popup>
