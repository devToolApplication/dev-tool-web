<p-panel [toggleable]="false">
  <ng-template pTemplate="header">
    <div class="flex w-full items-center justify-between gap-3">
      <div>
        <div class="text-base font-semibold">{{ TEXT.StrategyConfiguration | translateContent }}</div>
        <div class="text-sm text-surface-500">{{ subtitle | translateContent }}</div>
      </div>
    </div>
  </ng-template>

  @if (visible()) {
    <app-form-input
      #configForm
      [config]="config"
      [context]="context"
      [initialValue]="initialValue"
      [showSubmit]="false"
      (valueChange)="configChange.emit($event)"
    ></app-form-input>
  }
</p-panel>
