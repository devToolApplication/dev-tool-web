<app-panel [title]="TEXT.StrategyConfiguration" [description]="subtitle">
  @if (visible()) {
    <app-form-input
      #configForm
      [config]="config"
      [context]="context"
      [initialValue]="initialValue"
      [showSubmit]="false"
      (valueChange)="configChange.emit($event)"
    ></app-form-input>
  }
</app-panel>
