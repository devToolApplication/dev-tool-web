<p-panel [toggleable]="false">
  <ng-template pTemplate="header">
    <div class="flex w-full items-center justify-between gap-3">
      <div>
        <div class="text-base font-semibold">{{ TEXT.RiskReward | translateContent }}</div>
        <div class="text-sm text-surface-500">{{ TEXT.RiskRewardDesc | translateContent }}</div>
      </div>
    </div>
  </ng-template>

  <div class="grid grid-cols-12 gap-4" [formGroup]="form">
    <div class="col-span-12 md:col-span-4">
      <label class="mb-2 block text-sm font-medium">{{ TEXT.EntryMode | translateContent }}</label>
      <p-select class="w-full" [options]="entryModeOptions | translateContent" optionLabel="label" optionValue="value" formControlName="entryMode"></p-select>
    </div>
    <div class="col-span-12 md:col-span-4">
      <label class="mb-2 block text-sm font-medium">{{ TEXT.StopLossMode | translateContent }}</label>
      <p-select class="w-full" [options]="slModeOptions | translateContent" optionLabel="label" optionValue="value" formControlName="slMode"></p-select>
    </div>
    <div class="col-span-12 md:col-span-4">
      <label class="mb-2 block text-sm font-medium">{{ TEXT.TakeProfitRr | translateContent }}</label>
      <p-inputNumber class="w-full" inputStyleClass="w-full" [min]="0.1" [step]="0.1" formControlName="tpRr"></p-inputNumber>
    </div>

    <div class="col-span-12 md:col-span-6">
      <label class="mb-2 block text-sm font-medium">{{ TEXT.MaxTradesPerDay | translateContent }}</label>
      <p-inputNumber class="w-full" inputStyleClass="w-full" [min]="1" [step]="1" formControlName="maxTradesPerDay"></p-inputNumber>
    </div>
    <div class="col-span-12 md:col-span-6">
      <label class="mb-2 block text-sm font-medium">{{ TEXT.StrategyValidity | translateContent }}</label>
      <p-select class="w-full" [options]="validityOptions | translateContent" optionLabel="label" optionValue="value" formControlName="strategyValidity"></p-select>
    </div>
  </div>
</p-panel>
