<section class="crud-page">
  <div class="header-row">
    <h2>{{ 'tradeBot.chartTitle' | translateContent }}</h2>
  </div>

  <div class="card chart-toolbar-card mb-4">
    <div class="chart-toolbar-top">
      <div class="chart-field chart-field--fixed">
        <app-input-text label="tradeBot.symbol" [value]="syncConfig?.symbol ?? ''" [disabled]="true"></app-input-text>
      </div>
      <div class="chart-field chart-field--fixed">
        <app-select
          label="tradeBot.intervals"
          [(ngModel)]="selectedInterval"
          [options]="intervalOptions"
          [disabled]="!syncConfig"
        ></app-select>
      </div>
    </div>

    <div class="chart-range-row">
      <label class="chart-label chart-range-label">{{ 'tradeBot.timeRange' | translateContent }}</label>
      <div class="chart-range-controls">
        <div class="chart-field chart-field--grow">
          <label class="chart-sub-label">{{ 'tradeBot.dateRange' | translateContent }}</label>
          <app-date-picker
            label="tradeBot.dateRange"
            [showTime]="true"
            hourFormat="24"
            selectionMode="range"
            [(ngModel)]="dateRange"
          ></app-date-picker>
        </div>
      </div>
    </div>

    <div class="chart-toolbar-actions">
      <div class="flex gap-2 flex-wrap">
        <app-button label="tradeBot.loadChart" icon="pi pi-refresh" severity="info" [disabled]="!syncConfig" (buttonClick)="onLoadChart()"></app-button>
        <app-button label="tradeBot.back" icon="pi pi-arrow-left" severity="secondary" (buttonClick)="onBack()"></app-button>
      </div>
    </div>

  </div>

  <div class="card">
    <app-trade-bot-chart-preview [response]="chartResponse"></app-trade-bot-chart-preview>
  </div>
</section>
