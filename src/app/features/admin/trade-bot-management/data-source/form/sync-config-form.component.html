<app-base-crud-page
  [pageConfig]="{
    title: 'Trade Bot Data Source - ' + (editId ? 'Edit' : 'Create'),
    description: 'Configure which market data resources and intervals the trade bot should keep synchronized.',
    actions: [
      { id: 'back', label: 'Back', icon: 'pi pi-arrow-left', buttonClass: 'p-button-text', goBack: true },
      { id: 'submit', label: 'Save', icon: 'pi pi-save', loading: loading, submitForm: true }
    ],
    infoSection: {
      title: 'Data Sync Scope',
      description: 'Select the resource, symbol, and intervals to control which datasets are fetched and refreshed for the bot.'
    }
  }"
  [formConfig]="formConfig"
  [formContext]="formContext"
  [formInitialValue]="formInitialValue"
  [formVisible]="formVisible()"
  [submitting]="loading"
  (formSubmit)="onSubmitForm($event)"
></app-base-crud-page>
