<section class="flex flex-col gap-4">
  <app-card>
    <div class="mb-3 text-lg font-semibold">{{ 'tradeBot.replay.init' | translateContent }}</div>
    <app-form-input
      [config]="replayForm"
      [context]="formContext"
      [initialValue]="replayInitialValue"
      [submitting]="loading()"
      (formSubmit)="initReplay($event)"
    ></app-form-input>
  </app-card>

  @if (replay()) {
    <app-candle-chart
      [mode]="'REPLAY'"
      [config]="chartConfig()"
      [candles]="chartCandles()"
      [indicators]="chartIndicators()"
      [replayConfig]="replayConfig"
      [evaluationConfig]="chartEvaluationConfig()"
      [evaluateHandler]="evaluateCurrentBar"
      (strategySignal)="onChartStrategySignal($event)"
      (ruleEvaluated)="onChartRuleEvaluated($event)"
      (error)="onChartError()"
    ></app-candle-chart>

    <app-table [config]="candleTableConfig" [data]="replay()?.candles ?? []" [loading]="loading()"></app-table>

    <app-card>
      <div class="mb-3 text-lg font-semibold">{{ 'tradeBot.replay.overlays' | translateContent }}</div>
      <app-json-preview>{{ replayJson() }}</app-json-preview>
    </app-card>
  }

  <app-card>
    <div class="mb-3 text-lg font-semibold">{{ 'tradeBot.replay.evaluate' | translateContent }}</div>
    <app-form-input
      [config]="evaluateForm"
      [context]="formContext"
      [initialValue]="evaluateInitialValue"
      [showSubmit]="false"
      [submitting]="loading()"
      (valueChange)="evaluateModel.set($event)"
      (formSubmit)="evaluateTrace($event)"
    ></app-form-input>
    <div class="mt-3 flex flex-wrap gap-2">
      <app-button
        icon="pi pi-sitemap"
        label="tradeBot.action.evaluateTrace"
        [loading]="loading()"
        (buttonClick)="evaluateTrace(evaluateModel())"
      ></app-button>
      <app-button
        icon="pi pi-bolt"
        label="tradeBot.action.evaluateStrategy"
        severity="info"
        [loading]="loading()"
        (buttonClick)="evaluateStrategy(evaluateModel())"
      ></app-button>
    </div>
  </app-card>

  @if (evaluation()) {
    <app-card>
      <div class="mb-3 text-lg font-semibold">{{ 'tradeBot.replay.evaluation' | translateContent }}</div>
      <app-json-preview>{{ evaluationJson() }}</app-json-preview>
    </app-card>
  }
</section>
