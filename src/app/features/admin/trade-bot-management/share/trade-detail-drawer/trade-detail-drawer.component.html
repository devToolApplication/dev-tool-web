@if (activeTrade()) {
  <app-card padding="md" class="trade-drawer" surface="strong">
    <app-panel title="tradeBot.tradeDetail.title" [description]="activeTrade()?.tradeId ?? ''">
      <div panel-actions>
        <app-button icon="pi pi-times" severity="secondary" label="tradeBot.action.close" (buttonClick)="close.emit()"></app-button>
      </div>

      <app-key-value-list [items]="detailItems()" layout="two-column"></app-key-value-list>

      <app-panel title="tradeBot.tradeDetail.orders">
        @if (orderItems().length > 0) {
          <app-status-list [items]="orderItems()" density="compact"></app-status-list>
        } @else {
          <app-empty-state title="tradeBot.tradeDetail.noOrders"></app-empty-state>
        }
      </app-panel>

      <app-panel title="tradeBot.tradeDetail.events">
        @if (eventItems().length > 0) {
          <app-status-list [items]="eventItems()" density="compact"></app-status-list>
        } @else {
          <app-empty-state title="tradeBot.tradeDetail.noEvents"></app-empty-state>
        }
      </app-panel>

      <app-panel title="tradeBot.tradeDetail.ruleTrace">
        <app-rule-tree-viewer [trace]="activeTrace()"></app-rule-tree-viewer>
      </app-panel>
    </app-panel>
  </app-card>
}
