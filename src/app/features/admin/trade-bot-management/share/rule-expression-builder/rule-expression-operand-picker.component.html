<div class="rule-operand-picker" [class.rule-operand-picker--open]="open()">
  <div class="rule-operand-picker__row">
    <app-button
      icon="pi pi-search"
      [label]="resolvedLabel"
      severity="secondary"
      [text]="!hasValue"
      [disabled]="readonlyOrDisabled"
      [styleClass]="hasValue ? 'rule-operand-picker__trigger' : 'rule-operand-picker__trigger rule-operand-picker__trigger--empty'"
      [ariaLabel]="label"
      (buttonClick)="toggleOpen()"
    ></app-button>

    @if (constantOperand; as constant) {
      <app-input-number
        label=""
        [value]="$any(constant.value ?? 0)"
        [disabled]="readonlyOrDisabled"
        (valueChange)="updateConstantNumber($event)"
      ></app-input-number>
    }
  </div>

  @if (open()) {
    <div class="rule-operand-picker__menu" [ngStyle]="menuStyle()">
      <app-input-text
        label="tradeBot.ruleExpression.searchOperand"
        [value]="query()"
        [disabled]="readonlyOrDisabled"
        (valueChange)="updateQuery($event)"
      ></app-input-text>

      <div class="rule-operand-picker__groups">
        @for (group of optionGroups(); track group.label) {
          <section class="rule-operand-picker__group">
            <div class="rule-operand-picker__group-title">{{ group.label | translateContent }}</div>
            @for (option of group.options; track option.id) {
              <app-button
                [label]="option.label"
                [tooltip]="option.meta"
                severity="secondary"
                [text]="true"
                [disabled]="readonlyOrDisabled || option.disabled === true"
                styleClass="rule-operand-picker__option"
                (buttonClick)="selectOption(option)"
              ></app-button>
            }
          </section>
        } @empty {
          <div class="rule-operand-picker__empty">{{ 'noDataFound' | translateContent }}</div>
        }
      </div>
    </div>
  }
</div>
