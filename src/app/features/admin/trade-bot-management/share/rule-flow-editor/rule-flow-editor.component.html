<div class="rule-flow-editor">
  <div class="rule-flow-editor__toolbar">
    @if (!readonly) {
      <app-button icon="pi pi-plus-circle" label="tradeBot.ruleExpression.action.condition" severity="info" [text]="true" (buttonClick)="addCondition()"></app-button>
      <app-button icon="pi pi-sitemap" label="tradeBot.ruleExpression.group.AND" severity="secondary" [text]="true" (buttonClick)="addGroup('AND')"></app-button>
      <app-button icon="pi pi-share-alt" label="tradeBot.ruleExpression.group.OR" severity="secondary" [text]="true" (buttonClick)="addGroup('OR')"></app-button>
      <app-button icon="pi pi-ban" label="tradeBot.ruleExpression.group.NOT" severity="secondary" [text]="true" (buttonClick)="addNot()"></app-button>
      <app-button icon="pi pi-link" label="tradeBot.ruleExpression.action.ruleRef" severity="secondary" [text]="true" (buttonClick)="addRuleRef()"></app-button>
      <app-button icon="pi pi-trash" severity="danger" [text]="true" [disabled]="!selectedNodeId()" (buttonClick)="deleteSelected()"></app-button>
      <span class="rule-flow-editor__separator"></span>
    }
    <app-button icon="pi pi-search-plus" severity="secondary" [text]="true" (buttonClick)="zoomIn()"></app-button>
    <app-button icon="pi pi-search-minus" severity="secondary" [text]="true" (buttonClick)="zoomOut()"></app-button>
    <app-button icon="pi pi-expand" severity="secondary" [text]="true" (buttonClick)="fitContent()"></app-button>
    <app-button icon="pi pi-refresh" severity="secondary" [text]="true" (buttonClick)="resetZoom()"></app-button>
  </div>
  <div #paperContainer class="rule-flow-editor__canvas"></div>
</div>
