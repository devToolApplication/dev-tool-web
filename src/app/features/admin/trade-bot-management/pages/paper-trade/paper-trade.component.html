<app-page-shell
  title="tradeBot.paper.title"
  subtitle="tradeBot.paper.subtitle"
  layout="wide"
>
  <div page-actions class="flex flex-wrap items-center gap-2">
    @if (detail()?.session?.status) {
      <app-tag [value]="detail()?.session?.status ?? ''" severity="info"></app-tag>
    }
    <app-button label="tradeBot.paper.createAccount" icon="pi pi-wallet" severity="secondary" (buttonClick)="createAccountVisible.set(true)"></app-button>
    <app-button label="tradeBot.paper.startSession" icon="pi pi-play-circle" severity="success" (buttonClick)="startSessionVisible.set(true)"></app-button>
    <app-button label="tradeBot.action.refresh" icon="pi pi-refresh" [loading]="loading()" (buttonClick)="reload()"></app-button>
  </div>

  <app-section-panel title="tradeBot.paper.sessionContext" density="compact">
    <div class="grid grid-cols-1 gap-3 lg:grid-cols-2">
      <app-select
        label="tradeBot.paper.account"
        [options]="accountOptions()"
        [value]="selectedAccountId()"
        [showClear]="false"
        (valueChange)="selectAccount($event)"
      ></app-select>
      <app-select
        label="tradeBot.paper.session"
        [options]="sessionOptions()"
        [value]="selectedSessionId()"
        [showClear]="false"
        (valueChange)="selectSession($event)"
      ></app-select>
    </div>
  </app-section-panel>

  <div class="grid grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-4">
    @for (metric of kpiCards(); track metric.label) {
      <app-summary-metric-card [label]="metric.label" [value]="metric.value" [suffix]="metric.suffix ?? ''"></app-summary-metric-card>
    }
  </div>

  <app-section-panel title="tradeBot.paper.actions" density="compact">
    <div class="flex flex-wrap items-center gap-2">
      <app-button label="tradeBot.paper.evaluateLatest" icon="pi pi-bolt" severity="info" [disabled]="!detail()" [loading]="actionLoading()" (buttonClick)="evaluateLatest()"></app-button>
      <app-button label="tradeBot.paper.pause" icon="pi pi-pause" severity="warn" [disabled]="detail()?.session?.status !== 'RUNNING'" [loading]="actionLoading()" (buttonClick)="pause()"></app-button>
      <app-button label="tradeBot.paper.resume" icon="pi pi-play" severity="success" [disabled]="detail()?.session?.status !== 'PAUSED'" [loading]="actionLoading()" (buttonClick)="resume()"></app-button>
      <app-button label="tradeBot.paper.stop" icon="pi pi-stop-circle" severity="danger" [disabled]="!detail() || detail()?.session?.status === 'STOPPED'" [loading]="actionLoading()" (buttonClick)="stop()"></app-button>
      <app-button label="tradeBot.paper.resetAccount" icon="pi pi-refresh" severity="danger" [loading]="actionLoading()" (buttonClick)="resetAccount()"></app-button>
    </div>
  </app-section-panel>

  <app-realtime-progress-bar [state]="progress()" [showCancel]="false"></app-realtime-progress-bar>

  <app-paper-trade-chart-section
    [candles]="candles()"
    [overlays]="chartOverlays()"
    [activePositions]="activePositions()"
    [symbol]="detail()?.session?.symbol ?? 'BTCUSDT'"
    [interval]="detail()?.session?.interval ?? '1m'"
    [loading]="candleLoading()"
    (rangeBoundaryReached)="loadMoreCandles($event)"
  ></app-paper-trade-chart-section>

  <app-card>
    <app-paper-trade-data-tabs
      [sessions]="sessions()"
      [orders]="orders()"
      [fills]="fills()"
      [positions]="positions()"
      [equityCurve]="equityCurve()"
      [events]="events()"
      [detail]="detail()"
      [loading]="loading()"
      [error]="error()"
      (retry)="retryCurrentView()"
      (loadDetail)="loadDetail($event)"
    ></app-paper-trade-data-tabs>
  </app-card>

  <app-paper-trade-create-dialogs
    [accounts]="accounts()"
    [strategyOptions]="strategyOptions()"
    [actionLoading]="actionLoading()"
    [createAccountVisible]="createAccountVisible()"
    [startSessionVisible]="startSessionVisible()"
    (createAccountVisibleChange)="createAccountVisible.set($event)"
    (startSessionVisibleChange)="startSessionVisible.set($event)"
    (createAccount)="createAccount($event)"
    (startSession)="startSession($event)"
  ></app-paper-trade-create-dialogs>
</app-page-shell>
