<app-page-shell title="tradeBot.sandbox.title" subtitle="tradeBot.sandbox.subtitle" layout="wide">
  <app-button page-actions icon="pi pi-code" label="tradeBot.action.viewJson" severity="secondary" (buttonClick)="openRaw()"></app-button>

  <app-panel>
    <div panel-actions>
      <app-tabs [tabs]="tabs" [value]="activeTab()" (valueChange)="activeTab.set($event)"></app-tabs>
    </div>

    @switch (activeTab()) {
      @case ('fastBacktest') {
        <app-panel>
          <app-form-input
            [config]="sandboxForm"
            [context]="formContext"
            [initialValue]="sandboxInitialValue"
            [submitting]="loading()"
            (formSubmit)="runFastBacktest($event)"
          ></app-form-input>

          @if (fastBacktest()) {
            <app-responsive-grid [columns]="6" gap="md">
              @for (metric of fastBacktestSummary(); track metric.label) {
                <app-summary-metric-card [label]="metric.label" [value]="metric.value" [suffix]="metric.suffix ?? ''"></app-summary-metric-card>
              }
            </app-responsive-grid>
          }
        </app-panel>
      }
      @case ('evaluateBar') {
        <app-panel>
          <app-form-input
            [config]="evaluateBarForm"
            [context]="formContext"
            [initialValue]="evaluateInitialValue"
            [submitting]="evaluateLoading()"
            (formSubmit)="evaluate($event)"
          ></app-form-input>

          @if (evaluateBar()) {
            <app-responsive-grid [columns]="4" gap="md">
              @for (metric of evaluateSummary(); track metric.label) {
                <app-summary-metric-card [label]="metric.label" [value]="metric.value"></app-summary-metric-card>
              }
            </app-responsive-grid>
            <app-rule-tree-viewer [trace]="evaluateBar()?.ruleTrace ?? evaluateBar()?.trace ?? {}"></app-rule-tree-viewer>
          }
        </app-panel>
      }
      @case ('history') {
        <app-table
          [config]="historyTableConfig"
          [data]="history()"
          [loading]="loading() || evaluateLoading()"
          [error]="error()"
        ></app-table>
      }
      @case ('raw') {
        <app-panel>
          <app-fieldset legend="tradeBot.sandbox.result" [toggleable]="true" [collapsed]="true">
            <app-json-viewer [value]="fastBacktestJson()" [collapsed]="true"></app-json-viewer>
          </app-fieldset>
          <app-fieldset legend="tradeBot.sandbox.evaluateResult" [toggleable]="true" [collapsed]="true">
            <app-json-viewer [value]="evaluateBarJson()" [collapsed]="true"></app-json-viewer>
          </app-fieldset>
        </app-panel>
      }
    }
  </app-panel>

  <app-drawer
    [open]="rawDialogVisible()"
    (openChange)="handleRawOpenChange($event)"
    (closed)="closeRaw()"
    title="tradeBot.common.advancedRawJson"
    size="lg"
  >
    <app-json-viewer [value]="rawJson()" [collapsed]="true"></app-json-viewer>
  </app-drawer>
</app-page-shell>
