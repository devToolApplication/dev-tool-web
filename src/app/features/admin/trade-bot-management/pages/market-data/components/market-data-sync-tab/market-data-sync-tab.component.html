<app-section-panel title="tradeBot.sync.title" density="compact">
  <app-form-input
    [config]="syncForm"
    [context]="formContext"
    [initialValue]="syncInitialValue"
    [submitting]="syncLoading"
    (formSubmit)="syncSubmit.emit($event)"
  ></app-form-input>
  <div class="mt-3">
    <app-realtime-progress-bar [state]="syncProgress" [showCancel]="true" (cancel)="cancelSync.emit()"></app-realtime-progress-bar>
  </div>
</app-section-panel>

<app-table
  [config]="syncRunTableConfig"
  [data]="syncRuns"
  [loading]="syncLoading"
  [error]="syncRunError"
  (retry)="retrySyncRuns.emit()"
></app-table>
