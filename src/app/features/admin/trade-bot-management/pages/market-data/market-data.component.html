<app-page-shell
  title="tradeBot.market.title"
  subtitle="tradeBot.market.subtitle"
  layout="wide"
>
  <div page-actions class="flex flex-wrap gap-2">
    <app-button icon="pi pi-refresh" label="tradeBot.action.refresh" severity="secondary" [loading]="loading() || syncLoading()" (buttonClick)="loadGaps(); loadSyncRuns()"></app-button>
    <app-button icon="pi pi-sync" label="tradeBot.market.syncNow" severity="info" (buttonClick)="onTabChange('sync')"></app-button>
  </div>
  <div class="grid grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-4">
    @for (card of dataQualityCards(); track card.label) {
      <app-summary-metric-card [label]="card.label" [value]="card.value"></app-summary-metric-card>
    }
  </div>

  <app-card>
    <app-tabs [tabs]="tabs" [value]="activeTab()" (valueChange)="onTabChange($event)"></app-tabs>
  </app-card>

  @switch (activeTab()) {
    @case ('overview') {
      <app-section-panel title="tradeBot.market.tab.overview" density="compact">
        <app-data-quality-warning [candles]="candles()" [gaps]="gaps()"></app-data-quality-warning>
        <div class="mt-4 grid grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-3">
          @for (fact of overviewFacts(); track fact.label) {
            <div class="rounded-lg border app-border app-bg-soft p-3">
              <div class="text-xs font-semibold uppercase app-text-muted">{{ fact.label | translateContent }}</div>
              <div class="mt-1 app-text">{{ fact.value }}</div>
            </div>
          }
        </div>
      </app-section-panel>
    }

    @case ('candles') {
      <app-market-data-candle-tab
        [candles]="candles()"
        [loading]="loading()"
        [error]="candleError()"
        [gaps]="gaps()"
        (querySubmit)="loadCandles($event)"
        (rangeBoundaryReached)="loadMoreCandles($event)"
        (retryQuery)="loadCandles(candleQueryModel())"
        (viewGapsAround)="onTabChange('gaps'); loadGaps({ status: 'OPEN', source: $event.source, symbol: $event.symbol, timeframe: $event.timeframe })"
      ></app-market-data-candle-tab>
    }

    @case ('sync') {
      <app-market-data-sync-tab
        [syncRuns]="syncRuns()"
        [syncLoading]="syncLoading()"
        [syncRunError]="syncRunError()"
        [syncProgress]="syncProgress()"
        (syncSubmit)="syncBinanceUsdm($event)"
        (cancelSync)="cancelSync()"
        (retrySyncRuns)="loadSyncRuns()"
      ></app-market-data-sync-tab>
    }

    @case ('gaps') {
      <app-market-data-gap-tab
        [gaps]="gaps()"
        [loading]="syncLoading()"
        [error]="gapError()"
        (search)="loadGaps($event)"
        (resetFilter)="loadGaps({ status: 'OPEN' })"
        (retryGaps)="loadGaps()"
        (repairGap)="repairGap($event)"
        (ignoreGap)="ignoreGap($event)"
        (navigateToSync)="onTabChange('sync')"
      ></app-market-data-gap-tab>
    }

    @case ('import') {
      <app-market-data-import-tab
        [loading]="loading()"
        (importSubmit)="importCandles($event)"
      ></app-market-data-import-tab>
    }
  }
</app-page-shell>
