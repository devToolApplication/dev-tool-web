<app-page-shell title="tradeBot.cache.title" layout="wide">
  <div page-actions class="flex flex-wrap gap-2">
    <app-button icon="pi pi-refresh" label="tradeBot.action.refresh" severity="secondary" [loading]="loading()" (buttonClick)="load()"></app-button>
    <app-button icon="pi pi-trash" label="tradeBot.action.clearLocalCache" severity="danger" [loading]="loading()" (buttonClick)="clearLocal()"></app-button>
  </div>
  <div class="grid grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-5">
    @for (card of summaryCards(); track card.label) {
      <app-summary-metric-card [label]="card.label" [value]="card.value"></app-summary-metric-card>
    }
  </div>

  <app-table [config]="tableConfig" [data]="cacheRows()" [loading]="loading()" [error]="error()" (retry)="load()"></app-table>

  <app-card>
    <div class="mb-3 text-lg font-semibold">{{ 'tradeBot.cache.evict' | translateContent }}</div>
    <app-form-input
      [config]="evictForm"
      [context]="formContext"
      [initialValue]="evictModel()"
      [submitting]="loading()"
      (valueChange)="evictModel.set($event)"
      (formSubmit)="evict($event)"
    ></app-form-input>
  </app-card>

  <app-fieldset legend="tradeBot.common.advancedJson" [toggleable]="true" [collapsed]="true">
    <app-json-viewer [value]="statsJson()" [collapsed]="true"></app-json-viewer>
  </app-fieldset>
</app-page-shell>
