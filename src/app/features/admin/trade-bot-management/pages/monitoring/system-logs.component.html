<app-page-shell title="tradeBot.logs.title" layout="wide">
  <app-panel title="tradeBot.logs.filters">
    <app-form-input
      [config]="filterForm"
      [context]="formContext"
      [initialValue]="filterModel()"
      [submitting]="loading()"
      (valueChange)="filterModel.set($event)"
      (formSubmit)="load($event)"
    ></app-form-input>
  </app-panel>

  <app-responsive-grid [columns]="4">
    @for (card of summaryCards(); track card.label) {
      <app-summary-metric-card [label]="card.label" [value]="card.value"></app-summary-metric-card>
    }
  </app-responsive-grid>

  <app-table [config]="tableConfig" [data]="logs()" [loading]="loading()" [error]="error()" (retry)="retryLoad()"></app-table>

  <app-drawer
    [open]="!!selectedLog()"
    (openChange)="handleLogDrawerOpenChange($event)"
    (closed)="closeDrawer()"
    title="tradeBot.logs.detail"
    size="lg"
  >
    @if (selectedLog(); as log) {
      <app-responsive-grid [columns]="3">
        <app-panel title="tradeBot.field.level" surface="strong">
          <app-tag [value]="log.level" severity="danger"></app-tag>
        </app-panel>
        <app-panel title="tradeBot.field.module" surface="strong">
          <app-key-value-list [items]="[{ label: 'tradeBot.field.module', value: log.module ?? '-' }]" layout="one-column"></app-key-value-list>
        </app-panel>
        <app-panel title="tradeBot.field.runId" surface="strong">
          <app-key-value-list [items]="[{ label: 'tradeBot.field.runId', value: log.runId ?? '-' }]" layout="one-column"></app-key-value-list>
        </app-panel>
      </app-responsive-grid>
      <app-panel title="tradeBot.logs.message">
        <app-key-value-list [items]="[{ label: 'tradeBot.logs.message', value: log.message }]" layout="one-column"></app-key-value-list>
      </app-panel>
      <app-json-viewer [value]="logJson()" [collapsed]="true"></app-json-viewer>
    }
  </app-drawer>
</app-page-shell>
