<app-page-shell title="tradeBot.backtest.title" layout="wide">
  <app-panel title="tradeBot.backtest.run">
    <app-form-input
      [config]="formConfig"
      [context]="formContext"
      [initialValue]="formInitialValue"
      [submitting]="loading()"
      (formSubmit)="runBacktest($event)"
    ></app-form-input>
    <app-realtime-progress-bar [state]="progress()" [showCancel]="true" (cancel)="cancelBacktest()"></app-realtime-progress-bar>
  </app-panel>

  <app-table [config]="tableConfig" [data]="runs()" [loading]="loading()" [error]="error()" (retry)="loadRuns()"></app-table>
</app-page-shell>
