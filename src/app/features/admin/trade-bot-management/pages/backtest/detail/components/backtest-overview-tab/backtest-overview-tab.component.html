<div class="flex flex-col gap-4">
  <app-data-quality-warning [candles]="chartCandlesRaw" [snapshot]="marketDataSnapshot"></app-data-quality-warning>
  <div class="grid grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-3">
    @for (fact of runFacts(); track fact.label) {
      <div class="rounded-lg border app-border app-bg-soft p-3">
        <div class="text-xs font-semibold uppercase app-text-muted">{{ fact.label | translateContent }}</div>
        <div class="mt-1 break-words font-medium app-text">{{ fact.value ?? '-' }}</div>
      </div>
    }
  </div>
  <app-table [config]="metricTableConfig" [data]="metricRows()" [loading]="loading" [error]="error" (retry)="retry.emit()"></app-table>
</div>
