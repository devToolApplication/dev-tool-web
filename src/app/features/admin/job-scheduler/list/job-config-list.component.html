<app-page-shell title="jobScheduler.list.title" layout="wide">
  <app-realtime-progress-bar page-summary [state]="progress()" [showCancel]="false"></app-realtime-progress-bar>

  <app-table
    [config]="tableConfig"
    [data]="rows"
    [pageResponse]="pageResponse"
    [sortField]="sortField"
    [sortOrder]="sortOrder"
    [loading]="pageLoading() || actionLoading()"
    [error]="pageError()"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
    (search)="onSearch($event)"
    (resetFilter)="onResetFilter()"
    (create)="onCreate()"
    (retry)="refreshPage()"
  ></app-table>
</app-page-shell>
