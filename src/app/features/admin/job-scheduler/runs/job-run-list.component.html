<app-page-shell title="jobScheduler.runs.heading" [subtitle]="code" layout="wide">
  <app-button page-actions icon="pi pi-arrow-left" label="back" severity="secondary" (buttonClick)="onBack()"></app-button>

  <app-table
    [config]="tableConfig"
    [data]="rows"
    [pageResponse]="pageResponse"
    [sortField]="sortField"
    [sortOrder]="sortOrder"
    [loading]="pageLoading()"
    [error]="pageError()"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
    (search)="onSearch($event)"
    (resetFilter)="onResetFilter()"
    (retry)="refreshPage()"
  ></app-table>
</app-page-shell>
