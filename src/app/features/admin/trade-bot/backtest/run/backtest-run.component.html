<section class="crud-page">
  <div class="header-row">
    <h2>Run Backtest</h2>
  </div>

  <div class="card">
    @if (formVisible()) {
      <app-form-input
        [config]="formConfig"
        [context]="formContext"
        [initialValue]="formInitialValue"
        [submitting]="loading"
        (formSubmit)="onSubmitForm($event)"
      ></app-form-input>
    }
  </div>
</section>
