<p-panel>
  <ng-template pTemplate="header">
    <div class="flex w-full items-center justify-between gap-3">
      <div>
        <div class="text-base font-semibold">{{ TEXT.EventLog | translateContent }}</div>
        <div class="text-sm text-surface-500">{{ TEXT.EventLogDesc | translateContent }}</div>
      </div>
      <p-tag [value]="events.length + ' events'" severity="contrast"></p-tag>
    </div>
  </ng-template>

  <div class="flex flex-col gap-4">
    <p-multiSelect
      [options]="eventTypeOptions | translateContent"
      [ngModel]="selectedFilters"
      optionLabel="label"
      optionValue="value"
      [placeholder]="'tradeBot.filter.eventType' | translateContent"
      styleClass="w-full"
      (ngModelChange)="filterChange.emit($event)"
    ></p-multiSelect>

    <div class="flex max-h-[24rem] flex-col gap-2 overflow-auto pr-1">
      <button
        *ngFor="let event of events"
        type="button"
        class="rounded-xl border p-3 text-left transition"
        [ngClass]="{
          'border-primary bg-primary-50': event.id === selectedEventId,
          'border-surface-200 bg-surface-0 hover:border-primary': event.id !== selectedEventId
        }"
        (click)="eventSelect.emit(event)"
      >
        <div class="flex items-center justify-between gap-2">
          <div class="font-medium">{{ event.title }}</div>
          <p-tag [value]="event.type" severity="secondary"></p-tag>
        </div>
        <div class="mt-1 text-sm text-surface-500">{{ event.candleTime | date:'MM-dd HH:mm' }}</div>
        <div class="mt-1 text-sm text-surface-600">{{ (event.message || TEXT.NoEventDetail) | translateContent }}</div>
      </button>
    </div>
  </div>
</p-panel>
