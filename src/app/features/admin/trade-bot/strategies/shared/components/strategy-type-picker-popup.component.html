<app-base-popup
  [visible]="visible"
  [loading]="loading"
  [header]="TEXT.ChooseStrategyType"
  [subheader]="TEXT.StrategyRouteDesc"
  [hasProjectedHeader]="true"
  size="lg"
  (cancel)="cancel.emit()"
  (visibleChange)="visibleChange.emit($event)"
>
  <div popup-header class="flex flex-col gap-1">
    <span class="text-lg font-semibold">{{ TEXT.ChooseStrategyType | translateContent }}</span>
    <small class="text-surface-500">{{ TEXT.ChooseStrategyTypeDesc | translateContent }}</small>
  </div>

  <div class="flex flex-col gap-4">
    <span class="p-input-icon-left">
      <i class="pi pi-search"></i>
      <input
        pInputText
        class="w-full"
        [ngModel]="keyword"
        (ngModelChange)="keywordChange.emit($event)"
        [placeholder]="TEXT.SearchStrategyPlaceholder | translateContent"
      />
    </span>

    <div class="grid grid-cols-12 gap-3">
      <button
        *ngFor="let item of items"
        type="button"
        class="col-span-12 rounded-xl border border-surface-200 bg-surface-0 p-4 text-left transition hover:border-primary"
        (click)="select.emit(item)"
      >
        <div class="flex items-start gap-3">
          <div class="flex h-10 w-10 items-center justify-center rounded-full text-white" [style.background]="item.accentColor">
            <i [class]="item.icon"></i>
          </div>
          <div class="min-w-0 flex-1">
            <div class="flex flex-wrap items-center gap-2">
              <span class="font-semibold">{{ item.name }}</span>
              <p-tag [value]="STRATEGY_FAMILY_LABELS[item.family] || item.family" severity="secondary"></p-tag>
            </div>
            <div class="text-sm text-surface-500">{{ item.code }}</div>
            <div class="mt-1 text-sm text-surface-700">{{ (item.shortDescription || item.description) | translateContent }}</div>
          </div>
        </div>
      </button>
    </div>
  </div>
</app-base-popup>
