<app-base-crud-page
  [pageConfig]="{
    title: (editId ? 'Update Trade Strategy Binding' : 'Create Trade Strategy Binding'),
    description: 'Link an exchange, symbol, strategy, and rule into a single executable trading binding.',
    actions: [
      { id: 'back', label: 'Back', icon: 'pi pi-arrow-left', buttonClass: 'p-button-text', goBack: true },
      { id: 'submit', label: 'Save', icon: 'pi pi-save', loading: loading, submitForm: true }
    ],
    infoSection: {
      title: 'Binding Composition',
      description: 'This record controls how a concrete market and strategy pair is activated, filtered, and routed through rule evaluation.'
    }
  }"
  [formConfig]="formConfig"
  [formContext]="formContext"
  [formInitialValue]="formInitialValue"
  [formVisible]="formVisible()"
  [submitting]="loading"
  (formSubmit)="onSubmitForm($event)"
></app-base-crud-page>
