<app-page-shell title="aiAgent.executionTrace.title" layout="wide">
  @if (deepLinkError) {
    <app-alert
      class="execution-trace-alert"
      variant="danger"
      [message]="deepLinkError"
      [dismissible]="true"
      (dismissed)="clearDeepLinkError()"
    ></app-alert>
  }

  <app-table
    [config]="tableConfig"
    [data]="rows"
    [pageResponse]="pageResponse"
    [sortField]="sortField"
    [sortOrder]="sortOrder"
    [loading]="pageLoading()"
    [error]="pageError()"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
    (search)="onSearch($event)"
    (resetFilter)="onResetFilter()"
    (retry)="refreshPage()"
  ></app-table>
</app-page-shell>

<app-drawer
  [open]="stepPopupVisible"
  title="aiAgent.executionTrace.stepTrace"
  [subtitle]="selectedSession?.sessionId || ''"
  size="xl"
  [closeOnBackdrop]="!stepLoading"
  [closeOnEsc]="!stepLoading"
  (openChange)="onPopupVisibleChange($event)"
  (closed)="closePopup()"
>
  @if (selectedSession) {
    <app-section-panel
      title="aiAgent.executionTrace.sessionSummary"
      density="compact"
    >
      <app-key-value-list
        [items]="selectedSessionItems"
        layout="two-column"
      ></app-key-value-list>
    </app-section-panel>
  }

  <app-section-panel
    title="aiAgent.executionTrace.stepTimeline"
    density="compact"
  >
    <app-data-timeline
      [items]="selectedStepTimelineItems"
      [loading]="stepLoading"
      [error]="stepError"
      emptyTitle="aiAgent.executionTrace.noSteps"
      (retry)="refreshSelectedSteps()"
      (itemAction)="openStepPayload($event)"
    ></app-data-timeline>
  </app-section-panel>

  @if (selectedStepPayload) {
    <app-section-panel
      [title]="selectedStepPayloadTitle"
      density="compact"
    >
      <app-json-viewer [value]="selectedStepPayload.payload" [collapsed]="true"></app-json-viewer>
    </app-section-panel>
  }

  <div drawer-footer class="drawer-actions">
    <app-button
      [text]="true"
      label="close"
      [disabled]="stepLoading"
      (buttonClick)="closePopup()"
    ></app-button>
    <app-button
      icon="pi pi-refresh"
      label="aiAgent.executionTrace.refreshSteps"
      [loading]="stepLoading"
      [disabled]="!selectedSession"
      (buttonClick)="refreshSelectedSteps()"
    ></app-button>
  </div>
</app-drawer>
