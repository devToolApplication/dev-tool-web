<app-base-crud-page
  [pageConfig]="{
    title: editId ? 'uploadStorage.form.editTitle' : 'uploadStorage.form.createTitle',
    description: 'uploadStorage.form.description',
    actions: [
      { id: 'back', label: 'tradeBot.back', icon: 'pi pi-arrow-left', buttonClass: 'p-button-text', goBack: true },
      { id: 'submit', label: 'submit', icon: 'pi pi-save', loading: loading, submitForm: true }
    ],
    infoSection: {
      title: 'uploadStorage.form.infoTitle',
      description: 'uploadStorage.form.infoDescription'
    }
  }"
  [formConfig]="formConfig"
  [formContext]="formContext"
  [formInitialValue]="formInitialValue"
  [formVisible]="formVisible()"
  [submitting]="loading"
  (formSubmit)="onSubmitForm($event)"
></app-base-crud-page>
