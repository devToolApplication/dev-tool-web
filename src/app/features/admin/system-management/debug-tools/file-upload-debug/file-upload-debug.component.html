<app-page-shell title="systemManagement.fileUploadDebug.title" layout="wide">
  <app-page-header title="systemManagement.fileUploadDebug.title" subtitle="POST /file-mcrs/v1/upload">
    <div page-actions>
      <app-button
        icon="pi pi-refresh"
        label="systemManagement.fileUploadDebug.refreshStorage"
        [loading]="loadingStorages"
        [disabled]="loadingStorages || uploading"
        (buttonClick)="loadStorages()"
      ></app-button>
    </div>
  </app-page-header>

  <app-panel>
    <app-responsive-grid [columns]="2">
      <app-select
        label="systemManagement.fileUploadDebug.storage"
        [value]="selectedStorageId"
        (valueChange)="selectedStorageId = toStorageId($event)"
        [options]="storageOptions"
        placeholder="systemManagement.fileUploadDebug.defaultPinataStorage"
        [showClear]="true"
        [loading]="loadingStorages"
      ></app-select>

      <app-input-text
        label="systemManagement.fileUploadDebug.fileNameOverride"
        [value]="fileName"
        (valueChange)="fileName = $event || ''"
        placeholder="systemManagement.fileUploadDebug.fileNameOverridePlaceholder"
      ></app-input-text>

      <app-input-area
        label="systemManagement.fileUploadDebug.metadataJson"
        [value]="metadataJson"
        (valueChange)="metadataJson = $event || '{}'"
        [rows]="6"
        [maxRows]="8"
        contentType="json"
      ></app-input-area>
    </app-responsive-grid>

    <app-fileupload
      mode="advanced"
      [customUpload]="true"
      [multiple]="false"
      [maxFileSize]="104857600"
      [disabled]="uploading"
      chooseLabel="chooseFile"
      uploadLabel="upload"
      cancelLabel="clear"
      (uploadHandler)="onUpload($event)"
    ></app-fileupload>
  </app-panel>

  @if (uploadError) {
    <app-alert class="result-alert" variant="danger" [message]="uploadError"></app-alert>
  }

  @if (uploadResult) {
    <app-panel title="systemManagement.fileUploadDebug.uploadResult">
      <div panel-actions>
        <app-button
          icon="pi pi-external-link"
          label="open"
          [disabled]="!uploadResult.fileUrl"
          (buttonClick)="openUploadedFile()"
        ></app-button>
      </div>

      <app-key-value-list [items]="uploadResultItems" layout="two-column"></app-key-value-list>

      <div class="result-raw">
        <app-key-value-list [items]="uploadResultRawItems" layout="one-column"></app-key-value-list>
      </div>
    </app-panel>
  }
</app-page-shell>
