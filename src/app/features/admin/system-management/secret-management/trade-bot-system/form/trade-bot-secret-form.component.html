<app-base-crud-page
  [pageConfig]="{
    title: 'Trade Bot Secret - ' + (editId ? 'Edit' : 'Create'),
    description: 'Manage secret material used by trading integrations, exchange connectivity, and bot automation.',
    actions: [
      { id: 'back', label: 'Back', icon: 'pi pi-arrow-left', buttonClass: 'p-button-text', goBack: true },
      { id: 'submit', label: 'Save', icon: 'pi pi-save', loading: loading, submitForm: true }
    ],
    infoSection: {
      title: 'Trading Secret Store',
      description: 'Use this form to store credentials or tokens separately from non-sensitive trade bot configuration.'
    }
  }"
  [formConfig]="formConfig"
  [formContext]="formContext"
  [formInitialValue]="formInitialValue"
  [formVisible]="formVisible()"
  [submitting]="loading"
  (formSubmit)="onSubmitForm($event)"
></app-base-crud-page>
