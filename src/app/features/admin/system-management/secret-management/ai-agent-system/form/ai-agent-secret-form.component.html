<app-base-crud-page
  [pageConfig]="{
    title: 'AI Agent Secret - ' + (editId ? 'Edit' : 'Create'),
    description: 'Store sensitive secrets required by AI agent providers and external integrations.',
    actions: [
      { id: 'back', label: 'Back', icon: 'pi pi-arrow-left', buttonClass: 'p-button-text', goBack: true },
      { id: 'submit', label: 'Save', icon: 'pi pi-save', loading: loading, submitForm: true }
    ],
    infoSection: {
      title: 'Agent Secret Payload',
      description: 'Record secure values separately from config so credentials can be rotated without changing business settings.'
    }
  }"
  [formConfig]="formConfig"
  [formContext]="formContext"
  [formInitialValue]="formInitialValue"
  [formVisible]="formVisible()"
  [submitting]="loading"
  (formSubmit)="onSubmitForm($event)"
></app-base-crud-page>
