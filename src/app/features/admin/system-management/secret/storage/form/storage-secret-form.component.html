<app-base-crud-page
  [pageConfig]="{
    title: 'Storage Secret - ' + (editId ? 'Edit' : 'Create'),
    description: 'Manage secret values used by storage providers for authentication and secure API access.',
    actions: [
      { id: 'back', label: 'Back', icon: 'pi pi-arrow-left', buttonClass: 'p-button-text', goBack: true },
      { id: 'submit', label: 'Save', icon: 'pi pi-save', loading: loading, submitForm: true }
    ],
    infoSection: {
      title: 'Storage Credentials',
      description: 'Keep provider-specific secrets here so upload flows can authenticate without exposing values in plain config records.'
    }
  }"
  [formConfig]="formConfig"
  [formContext]="formContext"
  [formInitialValue]="formInitialValue"
  [formVisible]="formVisible()"
  [submitting]="loading"
  (formSubmit)="onSubmitForm($event)"
></app-base-crud-page>
