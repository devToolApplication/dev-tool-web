<app-base-crud-page
  [pageConfig]="{
    title: editId ? 'systemManagement.aiAgentCrawler.form.editTitle' : 'systemManagement.aiAgentCrawler.form.createTitle',
    description: 'systemManagement.aiAgentCrawler.form.description',
    actions: [
      { id: 'back', label: 'back', icon: 'pi pi-arrow-left', buttonClass: 'p-button-text', goBack: true },
      { id: 'submit', label: 'save', icon: 'pi pi-save', loading: loading(), submitForm: true }
    ],
    infoSection: {
      title: 'systemManagement.aiAgentCrawler.form.infoTitle',
      description: 'systemManagement.aiAgentCrawler.form.infoDescription'
    }
  }"
  [formConfig]="formConfig"
  [formContext]="formContext"
  [formInitialValue]="formInitialValue"
  [formVisible]="formVisible()"
  [submitting]="loading()"
  (formSubmit)="onSubmitForm($event)"
></app-base-crud-page>
