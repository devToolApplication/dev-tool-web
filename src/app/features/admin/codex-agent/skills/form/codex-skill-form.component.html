<app-base-crud-page
  [pageConfig]="{
    title: editId ? 'Edit Codex Skill' : 'Create Codex Skill',
    description: 'Manage file-based Codex skills. Each skill must include SKILL.md and can include scripts, references or assets.',
    actions: [
      { id: 'back', label: 'Back', icon: 'pi pi-arrow-left', goBack: true },
      { id: 'save', label: editId ? 'Update' : 'Create', icon: 'pi pi-save', submitForm: true, loading: loading }
    ]
  }"
  [formConfig]="formConfig"
  [formContext]="formContext"
  [formInitialValue]="formInitialValue"
  [formVisible]="formVisible()"
  [submitting]="loading"
  (formSubmit)="onSubmitForm($event)"
></app-base-crud-page>
