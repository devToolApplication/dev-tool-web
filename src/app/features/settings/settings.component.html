<app-page-shell title="settings.title" subtitle="settings.description" layout="wide">
  <app-responsive-grid page-summary [columns]="4">
    @for (item of settingsSummary(); track item.label) {
      <app-summary-metric-card
        [label]="item.label"
        [value]="item.value"
      ></app-summary-metric-card>
    }
  </app-responsive-grid>

  <app-card page-toolbar padding="sm">
    <app-tabs [tabs]="tabItems" [value]="activeTab()" (valueChange)="onTabChange($event)"></app-tabs>
  </app-card>

  @switch (activeTab()) {
    @case ('general') {
      <app-section-panel
        title="settings.generalQuickSettings"
        subtitle="settings.generalQuickSettingsDescription"
        density="compact"
        variant="muted"
      >
        <app-responsive-grid [columns]="2">
          <app-section-panel
            [title]="generalPanels[0].title"
            [subtitle]="generalPanels[0].description"
            density="compact"
          >
            <app-toggle-switch
              label="settings.enabled"
              [value]="themeMode() === 'dark'"
              (valueChange)="onDarkModeToggle($event === true)"
            ></app-toggle-switch>
          </app-section-panel>

          <app-section-panel
            [title]="generalPanels[1].title"
            [subtitle]="generalPanels[1].description"
            density="compact"
          >
            <app-select-button
              label="settings.themeModeTitle"
              [options]="themeModeOptions"
              [value]="themeMode()"
              [allowEmpty]="false"
              (valueChange)="onThemeModeChange($event)"
            ></app-select-button>
          </app-section-panel>

          <app-section-panel
            [title]="generalPanels[2].title"
            [subtitle]="generalPanels[3].description"
            density="compact"
          >
            <app-select-button
              label="settings.languageTitle"
              [options]="languageOptions"
              [value]="language()"
              [allowEmpty]="false"
              (valueChange)="onLanguageChange($event)"
            ></app-select-button>
          </app-section-panel>
        </app-responsive-grid>
      </app-section-panel>
    }

    @case ('theme') {
      <app-section-panel
        title="settings.customThemeTitle"
        subtitle="settings.customThemeDescription"
        density="compact"
      >
        <app-select-button
          section-actions
          label="settings.customThemeMode"
          [options]="customModeOptions"
          [value]="customThemeMode()"
          [allowEmpty]="false"
          (valueChange)="onCustomModeChange($event)"
        ></app-select-button>
        <app-button
          section-actions
          icon="pi pi-refresh"
          severity="secondary"
          label="reset"
          (buttonClick)="onResetThemeConfig()"
        ></app-button>

        <app-alert variant="info" [message]="'settings.customThemeDescription'"></app-alert>
      </app-section-panel>

      <app-responsive-grid [columns]="2">
        @for (field of themeTokenFields; track field.token) {
          <app-section-panel
            [title]="field.label"
            [subtitle]="field.description"
            density="compact"
          >
            <app-status-list
              [items]="[{ title: 'settings.activeValue', value: themeTokenValue()[field.token] }]"
            ></app-status-list>
            <app-select
              label="settings.presetValue"
              [options]="themeTokenOptions()[field.token]"
              [value]="themeTokenValue()[field.token]"
              (valueChange)="onThemeTokenChange(field.token, $event)"
            ></app-select>
            <app-input-text
              label="settings.manualValue"
              [value]="themeTokenValue()[field.token]"
              placeholder="customCssValue"
              (valueChange)="onThemeTokenManualInput(field.token, $event || '')"
            ></app-input-text>
          </app-section-panel>
        }
      </app-responsive-grid>
    }
  }
</app-page-shell>
